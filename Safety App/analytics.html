<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <script>(function(){try{var s=localStorage.getItem('safetylib_skin');if(s)document.documentElement.setAttribute('data-skin', s);}catch(e){}})();</script>
  <script>(function(){try{var sizes=[87.5,100,115,130,145];var idx=parseInt(localStorage.getItem('safetylib_text_size_idx'),10);if(!(idx>=0&&idx<sizes.length))idx=1;document.documentElement.style.fontSize=sizes[idx]+'%';}catch(e){}})();</script>
  <title>Usage Insights — Safety Scouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="analytics">
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <div class="site-header__bar">
      <a href="index.html" class="brand">
        <span class="brand__badge" aria-hidden="true">🧭</span>
        <span data-i18n="brand">Safety Scouts</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" data-i18n="nav_library">Home</a>
        <a href="parents.html" data-i18n="nav_parents">Parents &amp; Educators</a>
        <a href="about.html" data-i18n="nav_about">About</a>
      </nav>
      <div class="skin-switch" data-skin-switch role="group" aria-label="Color theme"></div>
      <div class="text-size-switch" data-textsize-switch role="group" aria-label="Text size"></div>
      <div class="rate-switch">
        <span aria-hidden="true">🔊</span>
        <label class="visually-hidden" for="rate-select" data-i18n="rate_label">Voice speed</label>
        <select id="rate-select" data-rate-select></select>
      </div>
      <div class="lang-switch">
        <label class="visually-hidden" for="lang-select" data-i18n="lang_label">Language</label>
        <select id="lang-select" data-lang-select></select>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="hero">
      <h1 data-i18n="analytics_title">Usage Insights</h1>
      <p data-i18n="analytics_lead">A private view of lesson activity recorded on this device.</p>
    </section>

    <section class="section">
      <p class="note-box" data-i18n="analytics_note"></p>
      <div data-analytics-root class="mt-lg"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p data-i18n="footer_note">Safety Scouts — a free resource.</p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/textsize.js"></script>
  <script src="js/speechrate.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
